<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LuxAI - Premium AI Chatbot</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- Highlight.js for code syntax -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    
    <!-- Marked.js for Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    
    <!-- Highlight.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    
    <!-- Particles.js for background effects -->
    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        luxury: {
                            50: '#f8f9fa',
                            100: '#e9ecef',
                            200: '#dee2e6',
                            300: '#ced4da',
                            400: '#adb5bd',
                            500: '#6c757d',
                            600: '#495057',
                            700: '#343a40',
                            800: '#212529',
                            900: '#111111',
                            950: '#000000',
                        }
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'glow': 'glow 2s ease-in-out infinite alternate',
                        'pulse-slow': 'pulse 4s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'spin-slow': 'spin 8s linear infinite',
                        'fadeIn': 'fadeIn 0.5s ease-out',
                        'slideIn': 'slideIn 0.3s ease-out',
                        'scaleIn': 'scaleIn 0.3s ease-out',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0px)' },
                            '50%': { transform: 'translateY(-20px)' },
                        },
                        glow: {
                            '0%': { boxShadow: '0 0 20px rgba(99, 102, 241, 0.5)' },
                            '100%': { boxShadow: '0 0 40px rgba(99, 102, 241, 0.8)' },
                        },
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        slideIn: {
                            '0%': { transform: 'translateX(-100%)' },
                            '100%': { transform: 'translateX(0)' },
                        },
                        scaleIn: {
                            '0%': { transform: 'scale(0.9)', opacity: '0' },
                            '100%': { transform: 'scale(1)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="bg-luxury-950 text-white overflow-hidden min-h-screen">
    
    <!-- Premium Loading Screen -->
    <div id="loadingScreen" class="fixed inset-0 z-[9999] bg-luxury-950 flex flex-col items-center justify-center transition-all duration-1000">
        <div class="relative">
            <!-- Animated AI Orb -->
            <div class="w-32 h-32 relative">
                <div class="absolute inset-0 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 rounded-full animate-spin-slow blur-xl opacity-75"></div>
                <div class="absolute inset-2 bg-luxury-950 rounded-full flex items-center justify-center">
                    <div class="w-20 h-20 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-full animate-pulse-slow"></div>
                </div>
                <div class="absolute inset-0 flex items-center justify-center">
                    <svg class="w-12 h-12 text-white animate-float" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                </div>
            </div>
        </div>
        <h2 class="mt-8 text-3xl font-bold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent animate-pulse">
            LuxAI
        </h2>
        <p class="mt-2 text-gray-400">Loading premium experience...</p>
        <div class="mt-6 w-64 h-1 bg-gray-800 rounded-full overflow-hidden">
            <div class="h-full bg-gradient-to-r from-indigo-500 to-purple-500 rounded-full animate-pulse" style="width: 90%"></div>
        </div>
    </div>

    <!-- Floating Particles Background -->
    <div id="particles-js" class="fixed inset-0 pointer-events-none opacity-30"></div>

    <!-- Main Container -->
    <div id="app" class="flex h-screen opacity-0 transition-opacity duration-1000">
        
        <!-- Left Sidebar -->
        <aside id="sidebar" class="fixed lg:relative w-[85vw] max-w-[320px] lg:w-80 lg:translate-x-0 -translate-x-full lg:flex bg-luxury-900/95 backdrop-blur-xl border-r border-gray-800/50 flex flex-col transition-all duration-300 ease-in-out z-50">
            <!-- Sidebar Header -->
            <div class="p-4 border-b border-gray-800/50">
                <div class="flex items-center justify-between mb-4">
                    <h1 class="text-2xl font-bold bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">
                        LuxAI
                    </h1>
                    <button id="collapseSidebar" class="p-2 hover:bg-gray-800 rounded-lg transition-all duration-200 hover:scale-110">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"></path>
                        </svg>
                    </button>
                </div>
                
                <!-- New Chat Button -->
                <button id="newChatBtn" class="w-full py-3 px-4 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 rounded-xl font-medium transition-all duration-300 transform hover:scale-[1.02] hover:shadow-lg hover:shadow-indigo-500/25 flex items-center justify-center gap-2 group">
                    <svg class="w-5 h-5 group-hover:rotate-90 transition-transform duration-300" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                    New Chat
                </button>
            </div>

            <!-- Search Chats -->
            <div class="px-4 py-2">
                <div class="relative">
                    <input type="text" id="searchChats" placeholder="Search conversations..." 
                           class="w-full bg-gray-800/50 border border-gray-700/50 rounded-lg py-2 px-4 pl-10 text-sm focus:outline-none focus:border-indigo-500/50 focus:ring-1 focus:ring-indigo-500/50 transition-all duration-200">
                    <svg class="w-4 h-4 absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                    </svg>
                </div>
            </div>

            <!-- Chat History -->
            <div id="chatHistory" class="flex-1 overflow-y-auto px-2 py-2 space-y-1 scrollbar-thin scrollbar-thumb-gray-700 scrollbar-track-transparent">
                <!-- Chat history items will be dynamically added here -->
            </div>

            <!-- Sidebar Footer -->
            <div class="p-4 border-t border-gray-800/50">
                <div class="flex items-center justify-between text-sm text-gray-400">
                    <span>v2.1.0</span>
                    <span>Premium</span>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
       <main class="flex-1 flex flex-col relative z-10 w-full overflow-hidden">
            
            <!-- Top Bar -->
            <header class="bg-luxury-900/95 backdrop-blur-xl border-b border-gray-800/50 px-6 py-4 flex items-center justify-between">
                
                <!-- Mobile Menu Button -->
               <button id="mobileMenuBtn" class="block lg:hidden p-2 hover:bg-gray-800 rounded-lg">
    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
    </svg>
</button>

                <!-- Model Switcher -->
                <div class="relative" id="modelSwitcher">
                    <button id="modelSwitcherBtn" class="flex items-center gap-2 px-4 py-2 bg-gray-800/50 border border-gray-700/50 rounded-xl hover:border-indigo-500/50 transition-all duration-200 hover:shadow-lg hover:shadow-indigo-500/10">
                        <div class="w-2 h-2 bg-green-400 rounded-full animate-pulse"></div>
                        <span id="currentModel" class="font-medium">DeepSeek</span>
                        <svg class="w-4 h-4 transition-transform duration-200" id="modelDropdownArrow" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                        </svg>
                    </button>
                    
                    <!-- Model Dropdown -->
                    <div id="modelDropdown" class="hidden absolute top-full mt-2 left-0 w-64 bg-gray-900/95 backdrop-blur-xl border border-gray-700/50 rounded-xl shadow-2xl overflow-hidden z-50">
                        <div class="p-1">
                            <div class="px-3 py-2 text-xs text-gray-400 uppercase font-semibold">Select Model</div>
                            <button class="model-option w-full text-left px-4 py-3 hover:bg-gray-800 rounded-lg transition-all duration-200 flex items-center gap-3 group" data-model="deepseek">
                                <div class="w-8 h-8 bg-indigo-500/20 rounded-lg flex items-center justify-center group-hover:scale-110 transition-transform">
                                    <svg class="w-4 h-4 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                                    </svg>
                                </div>
                                <div>
                                    <div class="font-medium">DeepSeek V3</div>
                                    <div class="text-xs text-gray-400">Fast & Efficient</div>
                                </div>
                            </button>
                            <button class="model-option w-full text-left px-4 py-3 hover:bg-gray-800 rounded-lg transition-all duration-200 flex items-center gap-3 group" data-model="copilot">
                                <div class="w-8 h-8 bg-blue-500/20 rounded-lg flex items-center justify-center group-hover:scale-110 transition-transform">
                                    <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                                    </svg>
                                </div>
                                <div>
                                    <div class="font-medium">Copilot</div>
                                    <div class="text-xs text-gray-400">Smart Assistant</div>
                                </div>
                            </button>
                            <button class="model-option w-full text-left px-4 py-3 hover:bg-gray-800 rounded-lg transition-all duration-200 flex items-center gap-3 group" data-model="chatgpt">
                                <div class="w-8 h-8 bg-green-500/20 rounded-lg flex items-center justify-center group-hover:scale-110 transition-transform">
                                    <svg class="w-4 h-4 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path>
                                    </svg>
                                </div>
                                <div>
                                    <div class="font-medium">ChatGPT</div>
                                    <div class="text-xs text-gray-400">Advanced AI</div>
                                </div>
                            </button>
                            <button class="model-option w-full text-left px-4 py-3 hover:bg-gray-800 rounded-lg transition-all duration-200 flex items-center gap-3 group" data-model="nemotron">
                                <div class="w-8 h-8 bg-purple-500/20 rounded-lg flex items-center justify-center group-hover:scale-110 transition-transform">
                                    <svg class="w-4 h-4 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path>
                                    </svg>
                                </div>
                                <div>
                                    <div class="font-medium">Nemotron</div>
                                    <div class="text-xs text-gray-400">Powerful Model</div>
                                </div>
                            </button>
                        </div>
                    </div>
                </div>

                <!-- Top Bar Actions -->
                <div class="flex items-center gap-2">
                    <button id="themeToggle" class="p-2 hover:bg-gray-800 rounded-lg transition-all duration-200 hover:scale-110">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>
                        </svg>
                    </button>
                </div>
            </header>

            <!-- Chat Messages Area -->
            <div id="chatMessages" class="flex-1 overflow-y-auto px-4 py-6 space-y-6 scrollbar-thin scrollbar-thumb-gray-700 scrollbar-track-transparent">
                
                <!-- Welcome Screen -->
               <div id="welcomeScreen" class="flex flex-col items-center justify-center min-h-full animate-fadeIn px-4 py-6 overflow-hidden">
                    <!-- Animated AI Logo -->
                    <div class="relative mb-8">
                        <div class="w-24 h-24 relative">
                            <div class="absolute inset-0 bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 rounded-full animate-spin-slow blur-xl opacity-75"></div>
                            <div class="absolute inset-2 bg-luxury-950 rounded-full flex items-center justify-center">
                                <div class="w-16 h-16 bg-gradient-to-br from-indigo-600 to-purple-600 rounded-full animate-pulse-slow"></div>
                            </div>
                            <div class="absolute inset-0 flex items-center justify-center">
                                <svg class="w-8 h-8 text-white animate-float" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                                </svg>
                            </div>
                        </div>
                    </div>
                    
                    <h2 class="text-2xl sm:text-3xl lg:text-4xl font-bold mb-2 text-center bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">
                        Welcome to LuxAI
                    </h2>
                    <p class="text-gray-400 mb-8 text-lg">Your premium AI assistant, ready to help</p>
                    
                    <!-- Suggested Prompts -->
                   <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 w-full max-w-4xl px-2">
                        <button class="suggested-prompt p-4 bg-gray-800/30 border border-gray-700/30 rounded-xl hover:border-indigo-500/50 hover:bg-gray-800/50 transition-all duration-300 text-left group hover:scale-105" data-prompt="Explain quantum computing in simple terms">
                            <div class="flex items-center gap-3 mb-2">
                                <div class="w-8 h-8 bg-indigo-500/20 rounded-lg flex items-center justify-center group-hover:scale-110 transition-transform">
                                    <svg class="w-4 h-4 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9.663 17h4.673M12 3v1m6.364 1.636l-.707.707M21 12h-1M4 12H3m3.343-5.657l-.707-.707m2.828 9.9a5 5 0 117.072 0l-.548.547A3.374 3.374 0 0014 18.469V19a2 2 0 11-4 0v-.531c0-.895-.356-1.754-.988-2.386l-.548-.547z"></path>
                                    </svg>
                                </div>
                                <span class="font-medium text-sm">Quantum Computing</span>
                            </div>
                            <p class="text-xs text-gray-400">Explain complex concepts simply</p>
                        </button>
                        
                        <button class="suggested-prompt p-4 bg-gray-800/30 border border-gray-700/30 rounded-xl hover:border-purple-500/50 hover:bg-gray-800/50 transition-all duration-300 text-left group hover:scale-105" data-prompt="Write a creative story about space exploration">
                            <div class="flex items-center gap-3 mb-2">
                                <div class="w-8 h-8 bg-purple-500/20 rounded-lg flex items-center justify-center group-hover:scale-110 transition-transform">
                                    <svg class="w-4 h-4 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 4a2 2 0 114 0v1a1 1 0 001 1h3a1 1 0 011 1v3a1 1 0 01-1 1h-1a2 2 0 100 4h1a1 1 0 011 1v3a1 1 0 01-1 1h-3a1 1 0 01-1-1v-1a2 2 0 10-4 0v1a1 1 0 01-1 1H7a1 1 0 01-1-1v-3a1 1 0 00-1-1H4a2 2 0 110-4h1a1 1 0 001-1V7a1 1 0 011-1h3a1 1 0 001-1V4z"></path>
                                    </svg>
                                </div>
                                <span class="font-medium text-sm">Creative Writing</span>
                            </div>
                            <p class="text-xs text-gray-400">Let's create something amazing</p>
                        </button>
                        
                        <button class="suggested-prompt p-4 bg-gray-800/30 border border-gray-700/30 rounded-xl hover:border-pink-500/50 hover:bg-gray-800/50 transition-all duration-300 text-left group hover:scale-105" data-prompt="Help me plan a healthy meal plan for the week">
                            <div class="flex items-center gap-3 mb-2">
                                <div class="w-8 h-8 bg-pink-500/20 rounded-lg flex items-center justify-center group-hover:scale-110 transition-transform">
                                    <svg class="w-4 h-4 text-pink-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 15.546c-.523 0-1.046.151-1.5.454a2.704 2.704 0 01-3 0 2.704 2.704 0 00-3 0 2.704 2.704 0 01-3 0 2.704 2.704 0 00-3 0 2.704 2.704 0 01-3 0A2.704 2.704 0 003 15.546"></path>
                                    </svg>
                                </div>
                                <span class="font-medium text-sm">Meal Planning</span>
                            </div>
                            <p class="text-xs text-gray-400">Get healthy recipes</p>
                        </button>
                    </div>
                </div>
                
                <!-- Chat messages will be dynamically added here -->
            </div>

            <!-- Bottom Input Area -->
            <div class="border-t border-gray-800/50 bg-luxury-900/95 backdrop-blur-xl p-4">
                <div class="max-w-4xl mx-auto">
                    <div class="relative flex items-end gap-2 bg-gray-800/50 border border-gray-700/50 rounded-2xl p-2 focus-within:border-indigo-500/50 focus-within:shadow-lg focus-within:shadow-indigo-500/10 transition-all duration-200">
                        
                        <!-- Plus Button -->
                        <button id="plusBtn" class="p-2 hover:bg-gray-700 rounded-xl transition-all duration-200 hover:scale-110 flex-shrink-0">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
                            </svg>
                        </button>

                        <!-- Text Input -->
                        <textarea id="messageInput" 
                                  rows="1" 
                                  placeholder="Message LuxAI..." 
                                  class="flex-1 bg-transparent resize-none focus:outline-none text-white placeholder-gray-400 py-2 px-2 max-h-32"
                                  style="min-height: 44px;"></textarea>

                        <!-- Voice Input Button -->
                        <button id="voiceBtn" class="p-2 hover:bg-gray-700 rounded-xl transition-all duration-200 hover:scale-110 flex-shrink-0">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z"></path>
                            </svg>
                        </button>

                        <!-- Send Button -->
                        <button id="sendBtn" class="p-2 bg-indigo-600 hover:bg-indigo-500 rounded-xl transition-all duration-200 hover:scale-110 flex-shrink-0 disabled:opacity-50 disabled:cursor-not-allowed disabled:hover:scale-100">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path>
                            </svg>
                        </button>

                        <!-- Stop Generation Button -->
                        <button id="stopBtn" class="hidden p-2 bg-red-600 hover:bg-red-500 rounded-xl transition-all duration-200 hover:scale-110 flex-shrink-0">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                            </svg>
                        </button>
                    </div>
                    <p class="text-xs text-gray-500 text-center mt-2">LuxAI can make mistakes. Consider checking important information.</p>
                </div>
            </div>
        </main>

        <!-- Plus Button Menu Modal -->
        <div id="plusMenu" class="hidden fixed inset-0 z-50 flex items-center justify-center">
            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" id="plusMenuOverlay"></div>
            <div class="relative bg-gray-900/95 backdrop-blur-xl border border-gray-700/50 rounded-2xl p-6 w-96 shadow-2xl animate-scaleIn">
                <h3 class="text-xl font-bold mb-4">Quick Actions</h3>
                <div class="space-y-2">
                    <button id="createImageBtn" class="w-full p-4 bg-gray-800/50 border border-gray-700/30 rounded-xl hover:border-indigo-500/50 transition-all duration-200 flex items-center gap-3 group hover:scale-105">
                        <div class="w-10 h-10 bg-indigo-500/20 rounded-lg flex items-center justify-center group-hover:scale-110 transition-transform">
                            <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                            </svg>
                        </div>
                        <div class="text-left">
                            <div class="font-medium">Create Image</div>
                            <div class="text-xs text-gray-400">Generate AI images</div>
                        </div>
                    </button>
                    
                    <button id="uploadFileBtn" class="w-full p-4 bg-gray-800/50 border border-gray-700/30 rounded-xl hover:border-purple-500/50 transition-all duration-200 flex items-center gap-3 group hover:scale-105">
                        <div class="w-10 h-10 bg-purple-500/20 rounded-lg flex items-center justify-center group-hover:scale-110 transition-transform">
                            <svg class="w-5 h-5 text-purple-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                            </svg>
                        </div>
                        <div class="text-left">
                            <div class="font-medium">Upload File</div>
                            <div class="text-xs text-gray-400">Analyze documents</div>
                        </div>
                    </button>
                    
                    <button id="clearChatBtn" class="w-full p-4 bg-gray-800/50 border border-gray-700/30 rounded-xl hover:border-pink-500/50 transition-all duration-200 flex items-center gap-3 group hover:scale-105">
                        <div class="w-10 h-10 bg-pink-500/20 rounded-lg flex items-center justify-center group-hover:scale-110 transition-transform">
                            <svg class="w-5 h-5 text-pink-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                            </svg>
                        </div>
                        <div class="text-left">
                            <div class="font-medium">Clear Chat</div>
                            <div class="text-xs text-gray-400">Start fresh</div>
                        </div>
                    </button>
                    
                    <button id="quickActionsBtn" class="w-full p-4 bg-gray-800/50 border border-gray-700/30 rounded-xl hover:border-green-500/50 transition-all duration-200 flex items-center gap-3 group hover:scale-105">
                        <div class="w-10 h-10 bg-green-500/20 rounded-lg flex items-center justify-center group-hover:scale-110 transition-transform">
                            <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                            </svg>
                        </div>
                        <div class="text-left">
                            <div class="font-medium">Quick Actions</div>
                            <div class="text-xs text-gray-400">Common commands</div>
                        </div>
                    </button>
                </div>
            </div>
        </div>

        <!-- Image Generation Modal -->
        <div id="imageModal" class="hidden fixed inset-0 z-50 flex items-center justify-center">
            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" id="imageModalOverlay"></div>
            <div class="relative bg-gray-900/95 backdrop-blur-xl border border-gray-700/50 rounded-2xl p-6 w-full max-w-2xl shadow-2xl animate-scaleIn">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-xl font-bold">Generate Image</h3>
                    <button id="closeImageModal" class="p-2 hover:bg-gray-800 rounded-lg transition-all duration-200">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
                <div class="space-y-4">
                    <textarea id="imagePrompt" rows="3" placeholder="Describe the image you want to generate..." 
                              class="w-full bg-gray-800/50 border border-gray-700/50 rounded-xl p-4 text-white placeholder-gray-400 focus:outline-none focus:border-indigo-500/50 transition-all duration-200"></textarea>
                    <button id="generateImageBtn" class="w-full py-3 bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-500 hover:to-purple-500 rounded-xl font-medium transition-all duration-200 hover:scale-[1.02]">
                        Generate Image
                    </button>
                    <div id="imageResult" class="hidden mt-4">
                        <img id="generatedImage" src="" alt="Generated Image" class="w-full rounded-xl shadow-lg">
                        <div class="flex gap-2 mt-4">
                            <button id="downloadImageBtn" class="flex-1 py-2 bg-green-600 hover:bg-green-500 rounded-lg transition-all duration-200">
                                Download
                            </button>
                            <button id="regenerateImageBtn" class="flex-1 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg transition-all duration-200">
                                Regenerate
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Edit Message Modal -->
        <div id="editMessageModal" class="hidden fixed inset-0 z-50 flex items-center justify-center">
            <div class="absolute inset-0 bg-black/60 backdrop-blur-sm" id="editMessageModalOverlay"></div>
            <div class="relative bg-gray-900/95 backdrop-blur-xl border border-gray-700/50 rounded-2xl p-6 w-full max-w-lg shadow-2xl animate-scaleIn">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-xl font-bold">Edit Message</h3>
                    <button id="closeEditMessageModal" class="p-2 hover:bg-gray-800 rounded-lg transition-all duration-200">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path>
                        </svg>
                    </button>
                </div>
                <textarea id="editMessageInput" rows="4" class="w-full bg-gray-800/50 border border-gray-700/50 rounded-xl p-4 text-white placeholder-gray-400 focus:outline-none focus:border-indigo-500/50 transition-all duration-200"></textarea>
                <div class="flex gap-2 mt-4">
                    <button id="saveEditMessageBtn" class="flex-1 py-2 bg-indigo-600 hover:bg-indigo-500 rounded-lg transition-all duration-200">
                        Save & Resend
                    </button>
                    <button id="cancelEditMessageBtn" class="flex-1 py-2 bg-gray-700 hover:bg-gray-600 rounded-lg transition-all duration-200">
                        Cancel
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Hidden file input -->
    <input type="file" id="fileInput" class="hidden" accept=".txt,.pdf,.doc,.docx,.csv,.json,.xml">

    <!-- Scripts -->
    <script src="js/animations.js"></script>
    <script src="js/voice.js"></script>
    <script src="js/chat.js"></script>
    <script src="js/app.js"></script>
    <script src="js/commands.js"></script>
</body>
</html>
